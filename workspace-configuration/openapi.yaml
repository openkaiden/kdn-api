openapi: 3.0.0
info:
  title: Workspace configuration 
  version: 1.0.0
paths:
  /:
    get:
      summary: Workspace configuration
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceConfiguration'
              example:
                mounts:
                  - host: "$SOURCES/../main"
                    target: "$SOURCES/../main"
                  - host: "$HOME/.gitconfig"
                    target: "$HOME/.gitconfig"
                    ro: true
                  - host: "$HOME/.claude"
                    target: "$HOME/.claude"
                    ro: true
                  - host: "/absolute/path/to/data"
                    target: "/workspace/data"
                environment:
                  - name: "DEBUG"
                    value: "true"
                  - name: "API_KEY"
                    secret: "my-api-key"
                skills:
                  - /path/to/skill1
                  - /path/to/skill2
                mcp:
                  servers:
                    - name: "github"
                      url: "https://api.githubcopilot.com/mcp"
                      headers:
                        HEADER1: "value1"
                  commands:
                    - name: "playwright"
                      command: "npx"
                      args: ["-y", "@microsoft/mcp-server-playwright"]
                      env:
                        VAR1: "value1"
components:
  schemas:
    WorkspaceConfiguration:
      type: object
      additionalProperties: false
      properties:
        mounts:
          type: array
          items:
            $ref: '#/components/schemas/Mount'
          description: List of directories to mount in the workspace. Supports $SOURCES (workspace sources directory) and $HOME (user home directory) variables.
        environment:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentVariable'
        skills:
          type: array
          items:
            type: string
          description: List of folders containing skills (SKILL.md and related files) to be provided to the agent.
        mcp:
          $ref: '#/components/schemas/McpConfiguration'

    McpConfiguration:
      type: object
      additionalProperties: false
      properties:
        servers:
          type: array
          items:
            $ref: '#/components/schemas/McpServer'
          description: List of URL-based MCP servers
        commands:
          type: array
          items:
            $ref: '#/components/schemas/McpCommand'
          description: List of command-based MCP servers

    McpServer:
      type: object
      additionalProperties: false
      required:
        - name
        - url
      properties:
        name:
          type: string
          description: Name of the MCP server
        url:
          type: string
          description: URL of the MCP server
        headers:
          type: object
          additionalProperties:
            type: string
          description: HTTP headers to send with requests to the MCP server

    McpCommand:
      type: object
      additionalProperties: false
      required:
        - name
        - command
      properties:
        name:
          type: string
          description: Name of the MCP server
        command:
          type: string
          description: Command to run to start the MCP server
        args:
          type: array
          items:
            type: string
          description: Arguments to pass to the command
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variables to set for the command

    Mount:
      type: object
      additionalProperties: false
      required:
        - host
        - target
      properties:
        host:
          type: string
          description: Path in the host filesystem. Can use $SOURCES or $HOME variables (e.g., "$SOURCES/../main", "$HOME/.gitconfig", "/absolute/path")
        target:
          type: string
          description: Path in the workspace filesystem where the host path will be mounted. Can use $SOURCES or $HOME variables.
        ro:
          type: boolean
          default: false
          description: Mount as read-only. Defaults to false (read-write).

    EnvironmentVariable:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the environment variable
        value:
          type: string
          description: Value of the environment variable (mutually exclusive with secret)
        secret:
          type: string
          description: Name of the secret containing the value (mutually exclusive with value)
