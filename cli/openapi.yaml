openapi: 3.0.0
info:
  title: API
  version: 1.0.0
paths:
  /init:
    get:
      summary: Initialize a new workspace
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceId'
              example:
                id: 2c5f16046476be368fcada501ac6cdc6bbd34ea80eb9ceb635530c0af64681ea
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: sources directory does not exist: /tmp/not-found"
  /init/verbose:
    get:
      summary: Initialize a new workspace with verbose output
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
              example:
                id: 2c5f16046476be368fcada501ac6cdc6bbd34ea80eb9ceb635530c0af64681ea
                name: workspace1
                project: project1
                agent: claude
                model: model1
                state: stopped
                paths:
                  source: /home/user/workspace1
                  configuration: /home/user/workspace1/.kaiden
                timestamps:
                  created: 1777383824532
                  started: 1777383824532
                forwards:
                  - target: 8080
                    bind: "0.0.0.0"
                    port: 18080
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: sources directory does not exist: /tmp/not-found"
  /list:
    get:
      summary: List the Workspaces
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacesList'
              example:
                items:
                  - id: d07830f8ce31df3dc3bbcbbb4cd94470338bd26b45a5def8fe59b3198223ff18
                    name: workspace1
                    project: project1
                    agent: claude
                    model: model1
                    state: running
                    paths:
                      source: /home/user/workspace1
                      configuration: /home/user/workspace1/.kaiden
                    timestamps:
                      created: 1777383824532
                      started: 1777383824532
                    forwards:
                      - target: 8080
                        bind: "0.0.0.0"
                        port: 18080
                  - id: 20cb499a4561703e973631fa3036cc8be9a06b709759d23a7d7f6dd1df146d95
                    name: workspace2
                    project: project2
                    agent: claude
                    state: stopped
                    paths:
                      source: /home/user/workspace2
                      configuration: /home/user/.kdn/workspaces/workspace2
                    timestamps:
                      created: 1777383824532
                    forwards: []
  /info:
    get:
      summary: Display information about kdn
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Info'
              example:
                version: 0.3.0
                agents:
                  - claude
                  - goose
                runtimes:
                  - podman
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: failed to list agents"
  /remove:
    get:
      summary: Remove a workspace
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceId'
              example:
                id: 2c5f16046476be368fcada501ac6cdc6bbd34ea80eb9ceb635530c0af64681ea
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: workspace not found: unknown-id"
  /start:
    get:
      summary: Start a workspace
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceId'
              example:
                id: 2c5f16046476be368fcada501ac6cdc6bbd34ea80eb9ceb635530c0af64681ea
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: workspace not found: unknown-id"
  /stop:
    get:
      summary: Stop a workspace
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceId'
              example:
                id: 2c5f16046476be368fcada501ac6cdc6bbd34ea80eb9ceb635530c0af64681ea
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: workspace not found: unknown-id"
  /secret/create:
    get:
      summary: Create a secret
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretName'
              example:
                name: my-secret
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: secret already exists: my-secret"
  /secret/list:
    get:
      summary: List secrets
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretsList'
              example:
                items:
                  - name: my-secret
                    type: github
                    description: "GitHub token"
                  - name: my-other-secret
                    type: other
                    description: "a secret for example.com API"
                    envs:
                      - EXAMPLE_API_KEY
                      - EX_API_KEY
                    hosts:
                      - api.example.com
                      - dev.example.com
                    path: /
                    header: Authorization
                    headerTemplate: "Bearer ${value}"
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: failed to list secrets"
  /secret/remove:
    get:
      summary: Remove a secret
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretName'
              example:
                name: my-secret
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: secret not found: my-secret"
  /service/list:
    get:
      summary: List secret services
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretServicesList'
              example:
                items:
                  - name: github
                    description: "GitHub API"
                    hostPattern: "api.github.com"
                    headerName: "Authorization"
                    headerTemplate: "Bearer ${value}"
                    envVars:
                      - GH_TOKEN
                      - GITHUB_TOKEN
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Error: failed to list secrets services"
components:
  schemas:
    Error:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
      required:
      - error
    WorkspaceId:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
      required:
      - id
    WorkspaceState:
      type: string
      enum:
        - stopped
        - running
        - error
        - unknown
    WorkspacePaths:
      type: object
      additionalProperties: false
      properties:
        source:
          type: string
        configuration:
          type: string
      required:
      - source
      - configuration
    WorkspaceTimestamps:
      type: object
      additionalProperties: false
      properties:
        created:
          type: integer
          format: int64
        started:
          type: integer
          format: int64
      required:
      - created
    WorkspaceForward:
      type: object
      additionalProperties: false
      properties:
        target:
          type: integer
        bind:
          type: string
        port:
          type: integer
      required:
      - target
      - bind
      - port
    Workspace:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        name:
          type: string
        project:
          type: string
        agent:
          type: string
        model:
          type: string
        state:
          $ref: '#/components/schemas/WorkspaceState'
        paths:
          $ref: '#/components/schemas/WorkspacePaths'
        timestamps:
          $ref: '#/components/schemas/WorkspaceTimestamps'
        forwards:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceForward'
          example:
            - target: 8080
              bind: "0.0.0.0"
              port: 18080
            - target: 5432
              bind: "localhost"
              port: 5433
      required:
      - id
      - name
      - project
      - agent
      - state
      - paths
      - timestamps
      - forwards
    Info:
      type: object
      additionalProperties: false
      properties:
        version:
          type: string
        agents:
          type: array
          items:
            type: string
        runtimes:
          type: array
          items:
            type: string
      required:
      - version
      - agents
      - runtimes
    WorkspacesList:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
      required:
      - items
    SecretName:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
      required:
      - name
    SecretInfo:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        envs:
          type: array
          items:
            type: string
        hosts:
          type: array
          items:
            type: string
        path:
          type: string
        header:
          type: string
        headerTemplate:
          type: string
      required:
      - name
      - type
    SecretsList:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SecretInfo'
      required:
      - items
    SecretService:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string
        hostPattern:
          type: string
        headerName:
          type: string
        headerTemplate:
          type: string
        envVars:
          type: array
          items:
            type: string
      required:
        - name
        - hostPattern
        - headerName
    SecretServicesList:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SecretService'
      required:
        - items
